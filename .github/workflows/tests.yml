name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-pytest:
    name: backend pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install backend runtime dependencies
        # Tests run against MockConnector fixtures so we only need the
        # modules that backend/core/analysis/*.py imports at module load
        # time (pydantic / fastapi for the API modules that tests
        # transitively pull in, etc.). No volatility / regipy / pyshark.
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi pydantic

      - name: Run pytest
        working-directory: backend
        run: pytest --tb=short
