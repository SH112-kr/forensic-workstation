services:
  forensic-workstation:
    build: .
    container_name: forensic-workstation
    ports:
      - "8001:8001"
    volumes:
      # Mount evidence directories (adjust paths to your system)
      # Example: MFDB, KAPE output, memory dumps, disk images
      - ./evidence:/evidence
      # Persist projects across container restarts
      - ./projects:/app/projects
    environment:
      - PORT=8001
    restart: unless-stopped

